apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smoke-web
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: smoke.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smoke-web
                port:
                  name: http

