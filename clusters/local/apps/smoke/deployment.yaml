apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-web
  labels:
    app.kubernetes.io/name: smoke-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: smoke-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smoke-web
    spec:
      containers:
        - name: web
          image: traefik/whoami:v1.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

