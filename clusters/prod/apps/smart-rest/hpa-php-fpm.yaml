apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smart-rest-php-fpm
spec:
  minReplicas: 2
  maxReplicas: 6
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smart-rest-php-fpm
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
