apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-rest-nginx
  labels:
    app.kubernetes.io/name: smart-rest
    app.kubernetes.io/component: nginx
spec:
  # replicas не задаём: масштабом управляет HPA, иначе каждый apply/GitOps-sync
  # сбрасывал бы количество реплик обратно.
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smart-rest
      app.kubernetes.io/component: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smart-rest
        app.kubernetes.io/component: nginx
    spec:
      imagePullSecrets:
        - name: gitlab-smp
      containers:
        - name: nginx
          image: registry.gitlab.smp.am/rnckube/rancher-smartrest/web-main:CHANGE_ME
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: smart-rest-config
                optional: true
            - secretRef:
                name: smart-rest-secret
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
